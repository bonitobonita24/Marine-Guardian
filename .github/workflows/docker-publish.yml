name: Docker Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/marine-guardian

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=staging-latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Compute short SHA tag
        id: sha
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Instant redeploy of the staging stack after the image push: DeployStack
      # (auto_pull → docker compose pull + up -d on the new :staging-latest). Komodo's
      # git webhook doesn't fire for files-on-host stacks and the registry poll is
      # hourly — so CI drives it. Production is NEVER auto-deployed (manual promotion).
      # Runbook: Server-Setups/Powerbyte-Hostinger/runbooks/komodo-ci-deploy.md
      # (fmo-style: stack pulls :staging-latest; no SHA-pin Variable for staging.)
      - name: Deploy to Komodo (staging)
        if: github.ref == 'refs/heads/main'
        env:
          KOMODO_HOST: https://kmd.powerbyte.app
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
          KOMODO_STACK: marine-guardian-staging
        run: bash deploy/komodo-deploy.sh
