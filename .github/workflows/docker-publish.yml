name: Docker Build & Publish

on:
  push:
    branches: [main]
    # Doc/state-only commits (session handoffs, memory, markdown) must NOT trigger a
    # staging image rebuild + redeploy. GitHub skips a push only when EVERY changed
    # file matches paths-ignore, so mixed code+doc commits still build and deploy.
    # workflow_dispatch below remains a manual escape hatch (no path filter).
    paths-ignore:
      - '.cline/**'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/marine-guardian

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=staging-latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          # amd64 only — the Komodo VPS is amd64. arm64 under QEMU emulation makes
          # this Next.js monorepo build blow past the 30-min job timeout (the build
          # is cancelled before the Deploy step runs). Single-arch finishes in minutes.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Staging is NOT auto-deployed here (2026-07-09 — data-first validation gate) ──
      # CI's job ends at "build + push image" above. Staging deploys ONLY via
      # deploy/staging-refresh-and-deploy.sh, which enforces DATA-FIRST ordering:
      # it refreshes staging's DB from a PROD copy BEFORE pulling the candidate image
      # and running migrations, so the new code + migrations are rehearsed against real
      # prod-shaped data before the same image is ever promoted to production.
      # The old auto "Deploy to Komodo (staging)" step (DeployStack immediately after
      # the push) is removed because it updated the staging image WITHOUT the prod data
      # refresh, defeating the rehearsal. Production remains manual-promotion-only.
      # Pattern: ~/.claude/rules/staging-refresh-gate.md · Runbook: Server-Setups komodo-ci-deploy.md
