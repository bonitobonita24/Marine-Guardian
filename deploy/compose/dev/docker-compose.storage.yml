# marine-guardian storage — MinIO (S3-compatible) for dev env.
# Per V31 Phase 4 Part 7 template. Joins the shared app_network so the BullMQ
# pdf-render worker (packages/jobs) and Route Handlers (apps/web) can reach
# the API at http://${COMPOSE_PROJECT_NAME}_minio:9000 — and the human can
# reach the console at http://localhost:${STORAGE_CONSOLE_PORT}.
#
# Env var convention is STORAGE_* (matches apps/web/src/env.ts + packages/storage
# post-rename 2026-05-23). The container itself wants MINIO_ROOT_USER /
# MINIO_ROOT_PASSWORD — those map FROM STORAGE_ACCESS_KEY / STORAGE_SECRET_KEY
# below. MinIO requires the root password to be ≥8 chars; STORAGE_SECRET_KEY
# is the 48-char value generated at Phase 3 so this is fine.
#
# This file was MISSING from the dev compose set since scaffold — the Phase 4
# Part 7 template was followed but the storage compose file slipped through
# (see lessons.md 🔴 entry "docker-compose.storage.yml missing from dev scaffold"
# logged 2026-05-23 after the S551 smoke test exposed the gap downstream of
# the Per Area Report queue dispatch). Stage/prod compose files for this
# service are deferred to a follow-up sub-batch.

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

volumes:
  minio_data:
    name: ${COMPOSE_PROJECT_NAME}_minio_data

services:
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME}_minio
    hostname: ${COMPOSE_PROJECT_NAME}_minio
    env_file: ../../../.env.dev
    environment:
      TZ: Asia/Manila
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${STORAGE_PORT}:9000"
      - "${STORAGE_CONSOLE_PORT}:9001"
    networks:
      app_network:
        # Alias without underscores — the AWS S3 SDK validates hostnames per
        # RFC 1123 (no underscores allowed) before sending the request, so the
        # default container hostname `${COMPOSE_PROJECT_NAME}_minio` is rejected
        # with "Invalid Request (invalid hostname)". The hyphenated alias is
        # what app + worker reach via INTERNAL_STORAGE_ENDPOINT.
        aliases:
          - minio-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
