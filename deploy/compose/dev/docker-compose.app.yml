networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

services:
  app:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:dev-latest
    container_name: ${COMPOSE_PROJECT_NAME}_app
    hostname: ${COMPOSE_PROJECT_NAME}_app
    env_file: ../../../.env.dev
    environment:
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "${APP_PORT}:3000"
    networks: [app_network]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:dev-latest
    container_name: ${COMPOSE_PROJECT_NAME}_worker
    hostname: ${COMPOSE_PROJECT_NAME}_worker
    env_file: ../../../.env.dev
    environment:
      NODE_ENV: development
      WORKER_MODE: "true"
    command: ["node", "worker.js"]
    networks: [app_network]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
