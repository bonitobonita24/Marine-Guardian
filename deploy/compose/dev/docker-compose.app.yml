networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

services:
  app:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:dev-latest
    container_name: ${COMPOSE_PROJECT_NAME}_app
    hostname: ${COMPOSE_PROJECT_NAME}_app
    env_file: ../../../.env.dev
    environment:
      TZ: Asia/Manila
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: ${INTERNAL_DATABASE_URL}
      REDIS_URL: ${INTERNAL_REDIS_URL}
      REDIS_HOST: ${COMPOSE_PROJECT_NAME}_valkey
      REDIS_PORT: "6379"
      STORAGE_ENDPOINT: ${INTERNAL_STORAGE_ENDPOINT}
      # WEB_APP_INTERNAL_URL: worker builds the print-render callback URL from this. Non-secret +
      # deterministic per stack → baked in so a fresh env can't omit it (root cause of the
      # 2026-07-07 exports incident: reports stuck 'queued'). TELEGRAM_* stay secret in .env.<env>.
      WEB_APP_INTERNAL_URL: http://${COMPOSE_PROJECT_NAME}_app:3000
    ports:
      - "${APP_PORT}:3000"
    networks: [app_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:dev-latest
    container_name: ${COMPOSE_PROJECT_NAME}_worker
    hostname: ${COMPOSE_PROJECT_NAME}_worker
    env_file: ../../../.env.dev
    environment:
      TZ: Asia/Manila
      NODE_ENV: development
      WORKER_MODE: "true"
      DATABASE_URL: ${INTERNAL_DATABASE_URL}
      REDIS_URL: ${INTERNAL_REDIS_URL}
      REDIS_HOST: ${COMPOSE_PROJECT_NAME}_valkey
      REDIS_PORT: "6379"
      STORAGE_ENDPOINT: ${INTERNAL_STORAGE_ENDPOINT}
      # WEB_APP_INTERNAL_URL: worker builds the print-render callback URL from this. Non-secret +
      # deterministic per stack → baked in so a fresh env can't omit it (root cause of the
      # 2026-07-07 exports incident: reports stuck 'queued'). TELEGRAM_* stay secret in .env.<env>.
      WEB_APP_INTERNAL_URL: http://${COMPOSE_PROJECT_NAME}_app:3000
    command: ["node", "worker/start-workers.mjs"]
    networks: [app_network]
    restart: unless-stopped
