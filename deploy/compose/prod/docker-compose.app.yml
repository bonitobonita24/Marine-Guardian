networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true
  proxy:
    name: ${TRAEFIK_NETWORK:-proxy}
    external: true

services:
  app:
    # NO build: key — image pulled from Docker Hub only (never builds from source on server)
    # Tag controlled by APP_IMAGE_TAG in .env.prod (default: latest)
    # Traffic routed via Traefik reverse proxy — no host port exposure
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:${APP_IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}_app
    hostname: ${COMPOSE_PROJECT_NAME}_app
    env_file: ../../../.env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
    networks: [app_network, proxy]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.tls.certresolver=letsEncrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}_app.loadbalancer.server.port=3000"

  worker:
    # NO build: key — same image as app, different command
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:${APP_IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}_worker
    hostname: ${COMPOSE_PROJECT_NAME}_worker
    env_file: ../../../.env.prod
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
    command: ["node", "worker.js"]
    networks: [app_network]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
