networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true
  proxy:
    name: ${TRAEFIK_NETWORK:-proxy}
    external: true

services:
  app:
    # NO build: key — image pulled from Docker Hub only (never builds from source on server)
    # Tag controlled by APP_IMAGE_TAG in .env.staging (default: staging-latest)
    # Traffic routed via Traefik reverse proxy — no host port exposure
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:${APP_IMAGE_TAG:-staging-latest}
    container_name: ${COMPOSE_PROJECT_NAME}_app
    mem_limit: 640m
    mem_reservation: 192m
    cpus: 1.0
    hostname: ${COMPOSE_PROJECT_NAME}_app
    env_file: ../../../.env.staging
    environment:
      TZ: Asia/Manila
      NODE_ENV: production
      PORT: "3000"
      # DATABASE_URL / REDIS_URL in .env.staging point at localhost (host-side CLI). Containers
      # reach postgres/valkey via the Docker service hostname instead (mirrors dev).
      DATABASE_URL: ${INTERNAL_DATABASE_URL}
      REDIS_URL: ${INTERNAL_REDIS_URL}
      # STORAGE_ENDPOINT in .env.staging is localhost:9000 (host-side mc tools).
      # Containers reach the per-stack MinIO via the Docker network alias instead.
      STORAGE_ENDPOINT: ${INTERNAL_STORAGE_ENDPOINT}
    networks: [app_network, proxy]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}_app.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}_app.loadbalancer.server.port=3000"

  worker:
    # NO build: key — same image as app, different command
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/marine-guardian:${APP_IMAGE_TAG:-staging-latest}
    container_name: ${COMPOSE_PROJECT_NAME}_worker
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    hostname: ${COMPOSE_PROJECT_NAME}_worker
    env_file: ../../../.env.staging
    environment:
      TZ: Asia/Manila
      NODE_ENV: production
      WORKER_MODE: "true"
      DATABASE_URL: ${INTERNAL_DATABASE_URL}
      REDIS_URL: ${INTERNAL_REDIS_URL}
      REDIS_HOST: ${COMPOSE_PROJECT_NAME}_valkey
      REDIS_PORT: "6379"
      # pdf-render worker reaches MinIO via the Docker network alias (see app).
      STORAGE_ENDPOINT: ${INTERNAL_STORAGE_ENDPOINT}
    command: ["node", "worker/start-workers.mjs"]
    networks: [app_network]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
