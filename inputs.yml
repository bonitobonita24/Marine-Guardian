# inputs.yml — Marine Guardian Command Center
# Version: 3 — Generated by Phase 3
# Source: docs/PRODUCT.md + Phase 2 interview answers
# DO NOT EDIT MANUALLY — agents regenerate from PRODUCT.md

app:
  name: Marine Guardian — Command Center
  slug: marine-guardian
  tagline: Real-time operations intelligence for marine protected areas
  industry: marine-conservation
  version: 0.1.0

apps:
  - name: web
    framework: next
    port: 45204
    description: Command Center web application

packages:
  - shared
  - api-client
  - db
  - ui
  - jobs

tenancy:
  mode: multi
  routing: subdirectory
  shared_global_data:
    - event_type_category_definitions
    - platform_configuration

auth:
  provider: authjs
  strategy: credentials
  session_type: jwt
  jwt_fields:
    - userId
    - tenantId
    - roles

roles:
  - super_admin
  - site_admin
  - field_coordinator
  - operator

entities:
  - name: Tenant
    encrypted_fields:
      - earthranger_url
      - earthranger_username
      - earthranger_password
      - earthranger_das_token
      - earthranger_track_token
  - name: User
  - name: Subject
    synced_from: earthranger
  - name: Event
    synced_from: earthranger
  - name: EventType
    synced_from: earthranger
  - name: Patrol
    synced_from: earthranger
  - name: PatrolSegment
    synced_from: earthranger
  - name: Observation
    synced_from: earthranger
  - name: SubjectGroup
    synced_from: earthranger
  - name: PatrolArea
    native: true
  - name: PatrolSchedule
    native: true
  - name: AlertRule
    native: true
  - name: Notification
    native: true
  - name: SyncLog
    native: true
  - name: AuditLog
    native: true
  - name: AccompanyingRanger
    native: true
  - name: KnownRanger
    native: true

modules:
  - name: command-center
    description: War Room — 100-inch TV 24/7 monitoring display
  - name: dashboard
    description: Standard dashboard with KPIs and live feed
  - name: live-map
    description: Full-screen MapLibre GL map with all layers
  - name: event-management
    description: Kanban board for event state management
  - name: event-detail
    description: Full event record view and editing
  - name: patrol-monitoring
    description: Active and completed patrol tracking
  - name: patrol-area-planning
    description: Map-based polygon drawing for patrol zones
  - name: patrol-schedule
    description: Gantt chart for ranger assignments
  - name: reports-area
    description: Per-area event and patrol reports
  - name: reports-consolidated
    description: Cross-area comparison reports
  - name: reports-detailed
    description: Detailed event log with all fields
  - name: reports-ranger
    description: Ranger performance matrix and stats
  - name: ranger-detail
    description: Individual ranger performance detail
  - name: alert-system
    description: Configurable alert rules per tenant
  - name: notification-center
    description: Chronological alert and notification list
  - name: user-management
    description: CRUD users within tenant
  - name: tenant-settings
    description: EarthRanger connection and tenant profile
  - name: super-admin
    description: Platform-level tenant management
  - name: i18n
    description: Internationalization — EN, ID, MS

integrations:
  - name: earthranger
    type: rest_api
    auth: bearer_token
    sync: scheduled
    websocket: socketio
    per_tenant: true
    credentials_encrypted: true
    encryption: aes-256-gcm
  - name: smtp
    type: email
    description: Transactional email for alerts and password resets
  - name: twilio
    type: sms
    status: scaffolded
    active: false
  - name: msg91
    type: sms
    status: scaffolded
    active: false

jobs:
  enabled: true
  provider: bullmq
  queues:
    - name: er-sync
      description: EarthRanger data sync per tenant
      default_frequency_seconds: 30
    - name: alerts
      description: Alert evaluation after data sync
    - name: email
      description: Email notification delivery with retry
    - name: maintenance
      description: Stale data detection and report pre-computation

storage:
  enabled: true
  provider: minio
  # MinIO is the S3-compatible object store used for the pdf-render pipeline
  # (Phase 8 Batch 5 Item 3 — 5.3a infrastructure + 5.3c packages/storage
  # surface + Route Handler). Bucket convention: marine-guardian-{env}-exports.
  # AWS S3 migration path is open — packages/storage uses @aws-sdk/client-s3
  # so swapping the endpoint is configuration-only. Decisions locked in
  # DECISIONS_LOG.md under "ReportExport PDF Storage Backend" (5.3a) +
  # "MinIO Client Library Choice" (5.3c) + "Storage Feature Flag" (5.3c).

maps:
  library: mapcn
  engine: maplibre-gl
  features:
    - live_tracking
    - heatmaps
    - polygon_drawing
    - patrol_track_overlay
    - fly_to_animations
    - layer_controls

charts:
  library: recharts
  via: shadcn-ui-chart
  types:
    - horizontal_bar
    - stacked_bar
    - grouped_bar

complex_components:
  - kanban (kibo-ui)
  - gantt (kibo-ui)
  - rich_text_editor (kibo-ui)

i18n:
  library: next-intl
  languages:
    - en
    - id
    - ms
  default: en

security:
  encryption:
    algorithm: aes-256-gcm
    key_env_var: ENCRYPTION_KEY
    description: Column encryption for EarthRanger credentials per tenant
  rate_limiting:
    public: 30
    auth: 60
    api: 120
    upload: 20
  cors:
    dev: "localhost:*"
    staging: "https://mg-staging.powerbyte.app"
    prod: "https://mg.powerbyte.app"
  turnstile:
    enabled: false
  layers:
    - L1_trpc_tenant_scoping
    - L2_postgresql_rls
    - L3_rbac_middleware
    - L4_pgbouncer_pool_limits
    - L5_immutable_audit_log
    - L6_prisma_query_guardrails

realtime:
  - earthranger_socketio
  - in_app_notifications
  - live_event_feed
  - patrol_position_updates
  - war_room_auto_refresh
  - audio_chime_critical

ports:
  dev:
    base: 45194
    db: 45194
    pgbouncer: 45195
    redis: 45196
    minio: 45197
    minio_console: 45198
    mailhog_smtp: 45199
    mailhog_ui: 45200
    pgadmin: 45201
    app: 45204
    worker: 45205
    prisma_studio: 45214

domains:
  staging: mg-staging.powerbyte.app
  prod: mg.powerbyte.app

docker:
  publish: true
  registry: docker.io
  hub_repo: bonitobonita24/marine-guardian
  image_name: marine-guardian
  platforms:
    - linux/amd64
    - linux/arm64
  build_on_push_to: main
  dev_build: true

git:
  default_branch: main
  branch_pattern: "feat/{slug}"
  commit_style: conventional
  squash_merge: true
  use_worktrees: true

models:
  planning: claude-code
  execution: claude-sonnet-4-6
  governance: gemini-2.5-flash-lite

vibe_test:
  enabled: true

context7:
  enabled: true

accessibility:
  level: none

deploy:
  k8s:
    enabled: false

nfr:
  api_response_ms: 500
  concurrent_users_per_tenant: 50
  uptime_sla: "99.5%"
  data_retention:
    synced_data: indefinite
    sync_logs: 90_days
    notifications: 1_year
